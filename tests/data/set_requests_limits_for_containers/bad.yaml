apiVersion: v1
kind: Pod
metadata:
  namespace: test-namespace
  name: bad1
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
---
# Requests set but no limits
apiVersion: v1
kind: Pod
metadata:
  namespace: test-namespace
  name: bad2
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
    ports:
    - containerPort: 80