apiVersion: v1
kind: Pod
metadata:
  namespace: test-namespace
  name: good1
spec:
  automountServiceAccountToken: false
  containers:
  - name: nginx
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
  namespace: test-namespace
  name: good2
spec:
  volumes:
  - name: task-pv-storage
    hostPath:
      path: /home/
      type: Directory
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
    volumeMounts:
      - name: task-pv-storage
        mountPath: /mnt/sample
        readOnly: true