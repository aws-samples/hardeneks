apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: test-namespace
  name: good-deployment
  labels:
    app: good
spec:
  replicas: 3
  selector:
    matchLabels:
      app: good
  template:
    metadata:
      labels:
        app: good
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80