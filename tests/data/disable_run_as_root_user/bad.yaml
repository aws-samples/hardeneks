apiVersion: v1
kind: Pod
metadata:
  namespace: test-namespace
  name: bad1
spec:
  containers:
  - name: nginx
    image: nginx
---
# All containers should have a security context if none defined at pod level.
apiVersion: v1
kind: Pod
metadata:
  namespace: test-namespace
  name: bad2
spec:
  containers:
  - name: nginx1
    image: nginx
  - name: nginx2
    image: nginx
    securityContext:
      runAsUser: 1000
      runAsGroup: 3000