apiVersion: v1
kind: PersistentVolume
metadata:
  name: good1
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  mountOptions:
    - tls
  csi:
    driver: efs.csi.aws.com
    volumeHandle: some_id
    volumeAttributes:
      encryptInTransit: "true"
---
